<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1110 620" width="100%" role="img">
<title>Ticketing platform architecture</title>
<desc>A client talks only to the API Gateway, which routes by path prefix to the Users, Events, and Reservations services and performs a fail-fast JWT check. Users and Events services each own their table in a shared PostgreSQL database. The Reservations service also owns a table there, plus uses Redis for the 5-minute seat hold and idempotency keys, and publishes confirmed reservations to RabbitMQ. A separate Notifications service, reachable only through that queue and not through the Gateway, consumes those messages and calls the external Resend API to send confirmation email.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  .b { stroke-width: 1.2; }
  .ttl { font-size: 15px; font-weight: 600; }
  .sub { font-size: 12px; font-weight: 400; }
  .arr { fill: none; stroke-width: 1.5; stroke: #73726c; }
  .arr-dash { fill: none; stroke-width: 1.5; stroke: #73726c; stroke-dasharray: 5 4; }
  .neutral-f { fill: #F1EFE8; } .neutral-s { stroke: #5F5E5A; } .neutral-t { fill: #2C2C2A; }
  .gate-f { fill: #EEEDFE; } .gate-s { stroke: #534AB7; } .gate-t { fill: #26215C; }
  .svc-f { fill: #E1F5EE; } .svc-s { stroke: #0F6E56; } .svc-t { fill: #04342C; }
  .async-f { fill: #FAECE7; } .async-s { stroke: #993C1D; } .async-t { fill: #4A1B0C; }
  @media (prefers-color-scheme: dark) {
    .arr, .arr-dash { stroke: #9c9a92; }
    .neutral-f { fill: #3a3a38; } .neutral-s { stroke: #B4B2A9; } .neutral-t { fill: #F1EFE8; }
    .gate-f { fill: #3C3489; } .gate-s { stroke: #AFA9EC; } .gate-t { fill: #EEEDFE; }
    .svc-f { fill: #085041; } .svc-s { stroke: #5DCAA5; } .svc-t { fill: #E1F5EE; }
    .async-f { fill: #712B13; } .async-s { stroke: #F0997B; } .async-t { fill: #FAECE7; }
  }
</style>

<!-- connectors (drawn first, sit behind boxes) -->
<line class="arr" x1="550" y1="76" x2="550" y2="96" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="156" x2="216" y2="196" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="156" x2="550" y2="196" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="156" x2="894" y2="196" marker-end="url(#arrow)"/>
<line class="arr" x1="210" y1="256" x2="418" y2="316" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="256" x2="503" y2="316" marker-end="url(#arrow)"/>
<line class="arr" x1="820" y1="256" x2="562" y2="316" marker-end="url(#arrow)"/>
<line class="arr" x1="900" y1="256" x2="716" y2="316" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<line class="arr" x1="980" y1="256" x2="944" y2="316" marker-end="url(#arrow)"/>
<line class="arr" x1="940" y1="374" x2="940" y2="436" marker-end="url(#arrow)"/>
<line class="arr-dash" x1="940" y1="494" x2="940" y2="526" marker-end="url(#arrow)"/>

<!-- Client -->
<g>
  <rect class="b neutral-f neutral-s" x="450" y="20" width="200" height="56" rx="8"/>
  <text class="ttl neutral-t" x="550" y="42" text-anchor="middle" dominant-baseline="central">Client</text>
  <text class="sub neutral-t" x="550" y="60" text-anchor="middle" dominant-baseline="central">Postman or browser</text>
</g>

<!-- Gateway -->
<g>
  <rect class="b gate-f gate-s" x="430" y="100" width="240" height="56" rx="8"/>
  <text class="ttl gate-t" x="550" y="122" text-anchor="middle" dominant-baseline="central">API gateway</text>
  <text class="sub gate-t" x="550" y="140" text-anchor="middle" dominant-baseline="central">Routes by path, checks JWT</text>
</g>

<!-- Users / Events / Reservations services -->
<g>
  <rect class="b svc-f svc-s" x="100" y="200" width="220" height="56" rx="8"/>
  <text class="ttl svc-t" x="210" y="222" text-anchor="middle" dominant-baseline="central">Users service</text>
  <text class="sub svc-t" x="210" y="240" text-anchor="middle" dominant-baseline="central">Register, login, JWT</text>
</g>
<g>
  <rect class="b svc-f svc-s" x="440" y="200" width="220" height="56" rx="8"/>
  <text class="ttl svc-t" x="550" y="222" text-anchor="middle" dominant-baseline="central">Events service</text>
  <text class="sub svc-t" x="550" y="240" text-anchor="middle" dominant-baseline="central">Public catalog</text>
</g>
<g>
  <rect class="b svc-f svc-s" x="780" y="200" width="240" height="56" rx="8"/>
  <text class="ttl svc-t" x="900" y="222" text-anchor="middle" dominant-baseline="central">Reservations service</text>
  <text class="sub svc-t" x="900" y="240" text-anchor="middle" dominant-baseline="central">Seat hold + payment</text>
</g>

<!-- Postgres / Redis / RabbitMQ -->
<g>
  <rect class="b neutral-f neutral-s" x="380" y="316" width="200" height="56" rx="8"/>
  <text class="ttl neutral-t" x="480" y="338" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="sub neutral-t" x="480" y="356" text-anchor="middle" dominant-baseline="central">Shared database</text>
</g>
<g>
  <rect class="b neutral-f neutral-s" x="610" y="316" width="200" height="56" rx="8"/>
  <text class="ttl neutral-t" x="710" y="338" text-anchor="middle" dominant-baseline="central">Redis</text>
  <text class="sub neutral-t" x="710" y="356" text-anchor="middle" dominant-baseline="central">Hold TTL + idempotency</text>
</g>
<g>
  <rect class="b neutral-f neutral-s" x="830" y="316" width="220" height="56" rx="8"/>
  <text class="ttl neutral-t" x="940" y="338" text-anchor="middle" dominant-baseline="central">RabbitMQ</text>
  <text class="sub neutral-t" x="940" y="356" text-anchor="middle" dominant-baseline="central">Async event queue</text>
</g>

<!-- Notifications -->
<g>
  <rect class="b async-f async-s" x="830" y="436" width="220" height="56" rx="8"/>
  <text class="ttl async-t" x="940" y="458" text-anchor="middle" dominant-baseline="central">Notifications service</text>
  <text class="sub async-t" x="940" y="476" text-anchor="middle" dominant-baseline="central">Consumes queue, sends email</text>
</g>

<!-- Resend (external) -->
<g>
  <rect class="b async-f async-s" x="830" y="526" width="220" height="56" rx="8" stroke-dasharray="4 3"/>
  <text class="ttl async-t" x="940" y="548" text-anchor="middle" dominant-baseline="central">Resend (external)</text>
  <text class="sub async-t" x="940" y="566" text-anchor="middle" dominant-baseline="central">Real email API, optional</text>
</g>
</svg>
